<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#b03a2e"/></marker>
    <marker id="ag" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#6b5d4f"/></marker>
  </defs>
  <rect width="980" height="560" fill="#fbfaf7"/>
  <text x="40" y="42" font-size="22" font-weight="bold" fill="#2b2620">Figure 1. A cross-stratum attack chain</text>
  <text x="40" y="66" font-size="14" fill="#5c5147">No single-stratum defense breaks the chain; only coordinated, cross-layer controls do.</text>

  <!-- Stratum bands -->
  <g>
    <rect x="40" y="92" width="900" height="120" rx="8" fill="#ffffff" stroke="#8a7a66" stroke-width="1.4"/>
    <rect x="40" y="92" width="8" height="120" fill="#8a5a2b"/>
    <text x="64" y="116" font-size="13" font-weight="bold" fill="#8a5a2b" letter-spacing="1">STRATUM A &#183; DEVICE / PHYSICAL</text>

    <rect x="40" y="224" width="900" height="120" rx="8" fill="#ffffff" stroke="#8a7a66" stroke-width="1.4"/>
    <rect x="40" y="224" width="8" height="120" fill="#8a5a2b"/>
    <text x="64" y="248" font-size="13" font-weight="bold" fill="#8a5a2b" letter-spacing="1">STRATUM B &#183; NETWORK / ROUTING</text>

    <rect x="40" y="356" width="900" height="120" rx="8" fill="#ffffff" stroke="#8a7a66" stroke-width="1.4"/>
    <rect x="40" y="356" width="8" height="120" fill="#8a5a2b"/>
    <text x="64" y="380" font-size="13" font-weight="bold" fill="#8a5a2b" letter-spacing="1">STRATUM C &#183; ORCHESTRATION / VIRTUALIZATION</text>
  </g>

  <!-- Step boxes -->
  <g font-size="13.5" fill="#2b2620">
    <rect x="120" y="132" width="300" height="62" rx="6" fill="#f7ece4" stroke="#b03a2e" stroke-width="1.3"/>
    <text x="135" y="156" font-weight="bold">1 &#183; Node capture</text>
    <text x="135" y="178" font-size="12.5" fill="#5c5147">Adversary extracts legitimate keys</text>

    <rect x="120" y="264" width="360" height="62" rx="6" fill="#f7ece4" stroke="#b03a2e" stroke-width="1.3"/>
    <text x="135" y="288" font-weight="bold">2 &#183; Sybil / wormhole routing attack</text>
    <text x="135" y="310" font-size="12.5" fill="#5c5147">Looks identical to valid traffic (uses real keys)</text>

    <rect x="120" y="396" width="430" height="62" rx="6" fill="#f7ece4" stroke="#b03a2e" stroke-width="1.3"/>
    <text x="135" y="420" font-weight="bold">3 &#183; Mis-placed / naively-scaled IDS VNF</text>
    <text x="135" y="442" font-size="12.5" fill="#5c5147">Malicious flow evades inspection entirely</text>

    <!-- outcome -->
    <rect x="600" y="396" width="320" height="62" rx="6" fill="#2b2620"/>
    <text x="620" y="420" font-size="13.5" font-weight="bold" fill="#e8c9a0">RESULT: undetected compromise</text>
    <text x="620" y="442" font-size="12" fill="#f1eee7">spanning all three strata</text>
  </g>

  <!-- chain arrows -->
  <line x1="270" y1="194" x2="270" y2="262" stroke="#b03a2e" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="300" y1="326" x2="300" y2="394" stroke="#b03a2e" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="550" y1="427" x2="598" y2="427" stroke="#b03a2e" stroke-width="2.4" marker-end="url(#ar)"/>

  <!-- defense annotation -->
  <g>
    <rect x="600" y="132" width="320" height="120" rx="6" fill="#eef3ee" stroke="#3d6b4f" stroke-width="1.2"/>
    <text x="618" y="156" font-size="13" font-weight="bold" fill="#3d6b4f">Coordinated defense (breaks chain)</text>
    <text x="618" y="180" font-size="12" fill="#3a4a3f">A: lightweight crypto + attestation</text>
    <text x="618" y="200" font-size="12" fill="#3a4a3f">B: authenticated routing + trust scoring</text>
    <text x="618" y="220" font-size="12" fill="#3a4a3f">C: correct VNF placement + hardened</text>
    <text x="618" y="240" font-size="12" fill="#3a4a3f">    controller</text>
  </g>
  <line x1="600" y1="180" x2="486" y2="290" stroke="#6b5d4f" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ag)"/>
</svg>
